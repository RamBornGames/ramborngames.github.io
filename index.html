<p><a href="https://ramborngames.github.io/compersion/" target="_blank" rel="noopener noreferrer" referrerpolicy="no-referrer">Polyamory Game (Compersion)</a><br><span id="multiplayer-status" class="status">Multiplayer Server Status: <span class="outage">Down</span> <span class="bars outage">||||||||||||||</span></span><br><span class="url">https://ramborngames.github.io/compersion/</span><br>

<script>
const STATUS_ENDPOINT=""; // Future health endpoint, for example https://example.com/compersion/status.json
const states={ok:["Operational","ok"],degraded:["Degraded Performance","degraded"],partial:["Partial Outage","partial"],outage:["Down","outage"],maintenance:["Maintenance","maintenance"]};
const fallback={current:"outage",history:Array.from({length:14},(_,i)=>({state:"outage",label:`${14-i} day(s) ago: full outage.`}))};
function readHistory(){try{return JSON.parse(decodeURIComponent((document.cookie.match(/(?:^|; )compersion_status=([^;]*)/)||[])[1]||""))||fallback}catch{return fallback}}
function saveHistory(data){document.cookie="compersion_status="+encodeURIComponent(JSON.stringify(data))+"; max-age=7776000; path=/; SameSite=Lax"}
async function checkLiveStatus(){if(!STATUS_ENDPOINT)return null;try{let r=await fetch(STATUS_ENDPOINT,{cache:"no-store"});return r.ok?await r.json():fallback}catch{return fallback}}
function renderStatus(data){let host=document.getElementById("multiplayer-status"),state=states[data.current]||states.outage,label=document.createElement("span"),bars=document.createElement("span");label.className=state[1];label.textContent=state[0];bars.className="bars";(data.history||fallback.history).forEach(d=>{let s=states[d.state]||states.outage,bar=document.createElement("span");bar.className="bar "+s[1];bar.title=d.label||s[0];bar.setAttribute("aria-label",bar.title);bar.textContent="|";bars.append(bar)});host.replaceChildren("Multiplayer Server Status: ",label," ",bars)}
(async()=>{let data=await checkLiveStatus()||readHistory(); saveHistory(data); renderStatus(data)})();
</script>
